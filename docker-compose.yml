services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grants_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grants_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/grants_db
      JWT_SECRET: supersecretkey
      DEFAULT_ADMIN_PASSWORD: AdminPass123!
      REDIS_URL: redis://cache:6379
      OAUTH_PROVIDER: google
      OAUTH_CLIENT_ID: placeholder
      OAUTH_CLIENT_SECRET: placeholder
      OAUTH_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      OAUTH_TOKEN_URL: https://oauth2.googleapis.com/token
      OAUTH_USERINFO_URL: https://www.googleapis.com/oauth2/v3/userinfo
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
